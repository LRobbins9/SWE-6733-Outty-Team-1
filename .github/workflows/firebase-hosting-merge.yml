name: Deploy to Firebase Hosting on Merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Install Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # Speeds up subsequent runs

      # 2. Pull dependencies and build the web app
      - name: Install dependencies
        run: flutter pub get
        working-directory: ./source/outty

      - name: Build Flutter Web
        run: flutter build web --release
        working-directory: ./source/outty

      - name: Setup Node.js (Fix Firebase Bug)
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0' # Pin to an older, stable version before the keep-alive bug

      # 3. Run Unit Tests
      - name: Run Flutter Unit Tests
        run: flutter test
        working-directory: ./source/outty

      # 4. Deploy to Firebase
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OUTTY_FIREBASE_BACKEND }}
          entryPoint: ./source/outty
          channelId: live

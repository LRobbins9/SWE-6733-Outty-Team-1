# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on PR
on:
  pull_request:
    branches:
      - main
      
permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Set up the Flutter SDK
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # Speeds up subsequent PR builds

      # 2. Pull dependencies and build the web app
      - name: Install dependencies
        run: flutter pub get
        working-directory: ./source/outty

      - name: Build Flutter Web
        run: flutter build web --release
        working-directory: ./source/outty

      # 3. Deploy to a temporary Firebase Preview Channel
      - name: Deploy to Firebase Hosting Preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_OUTTY_FIREBASE_BACKEND }}
